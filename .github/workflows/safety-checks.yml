# Triggering the workflow
name: Safety Summary

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ dev ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Build (TS Check)
        run: npm run build

      - name: Generate Gemini Summary
        if: success()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git diff origin/main...HEAD > diff.txt
          node -e "
          const fs = require('fs');
          const diff = fs.readFileSync('diff.txt', 'utf8').substring(0, 5000);
          const apiKey = process.env.GEMINI_API_KEY;
          fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + apiKey, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: 'As a dev lead, summarize these Next.js/TS changes and confirm if they look safe. PR Diff: \n' + diff }] }]
            })
          })
          .then(res => res.json())
          .then(data => {
            const text = data.candidates[0].content.parts[0].text;
            fs.writeFileSync('summary.txt', text);
          }).catch(err => fs.writeFileSync('summary.txt', 'AI Summary failed, but tests passed!'));
          "
          
      - name: Post Comment
        if: success()
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: summary.txt